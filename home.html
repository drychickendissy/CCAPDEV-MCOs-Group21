<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="icon" href="assets/placeholder.png" type="image/png">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="global-sidebar.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="alert.css">
  <link rel="stylesheet" href="home.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <style>
    /* Accessibility fix */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* Modal Styling */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }
    .modal-content {
      background: #fdf8e2;
      border: 2px solid #000;
      width: 90%;
      max-width: 550px;
      position: relative;
    }
    .modal-header {
      padding: 15px 20px;
      border-bottom: 2px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: none; border: none; font-size: 24px; cursor: pointer;
    }
    .create-input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #000;
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="main-content">
    <header-component></header-component>
    <global-sidebar></global-sidebar>

    <div class="container">
      <nav-bar active="home"></nav-bar>

      <div class="page-section" style="--page-color: #a3b565;">
        <div class="content-box" style="--content-bg: #fdf8e2;">

          <div class="home-masthead">
            <div class="masthead-left">
              <div class="home-badge poppins-extrabold">ANIMO COMMONS DAILY</div>
              <div class="masthead-sub poppins-regular" id="mastheadDate">—</div>
            </div>
            <div class="masthead-right">
              <button class="create-post-btn home-create-btn" onclick="openCreatePostModal()">
                + Create Post
              </button>
              <a class="mini-link poppins-extrabold" id="profileLink" href="profile.html">Profile</a>
              <a class="mini-link poppins-extrabold" href="popular.html">Popular</a>
              <a class="mini-link poppins-extrabold" href="discover.html">Discover</a>
              <span class="login-pill poppins-regular" id="loginStatus">—</span>
            </div>
          </div>

          <div class="home-grid">
            <section class="paper-section">
              <div class="section-titlebar">
                <h2 class="poppins-extrabold">Latest Posts</h2>
                <span class="hint poppins-regular">Animo Commons posts</span>
              </div>
              <div class="paper-grid" id="paperGrid"></div>
              <div class="guest-gate" id="viewMoreGate" style="display:none;">
                <p class="poppins-regular">You’re in <b>Guest mode</b>. Login / Sign up to view posts and interact.</p>
                <div class="gate-actions">
                  <a class="gate-btn poppins-extrabold" href="login.html">Login</a>
                  <a class="gate-btn outline poppins-extrabold" href="sign-up.html">Sign Up</a>
                </div>
              </div>
            </section>

            <aside class="right-rail">
              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1642e;">
                  <div class="section-title">
                    <img src="assets/popular-icon.png" alt="popular" width="20" height="20">
                    <h3 class="poppins-extrabold">Popular</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="popular.html">View More</a>
                </div>
                <div class="preview-list" id="popularPreview"></div>
              </section>

              <section class="preview-block">
                <div class="section-topbar" style="--section-bg:#f1b02e;">
                  <div class="section-title">
                    <img src="assets/discover-icon.png" alt="discover" width="20" height="20">
                    <h3 class="poppins-extrabold">Discover Posts</h3>
                  </div>
                  <a class="view-more poppins-extrabold" href="discover.html">View More</a>
                </div>
                <div class="posts-grid-mini" id="discoverPreview"></div>
              </section>
            </aside>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="create-post-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="poppins-extrabold">Create New Post</h2>
        <button class="modal-close" onclick="closeCreatePostModal()">&times;</button>
      </div>
      <div class="modal-body" style="padding: 20px;">
        <div style="margin-bottom: 15px;">
          <label class="poppins-bold">Headline</label>
          <input type="text" id="post-title-input" placeholder="Enter title..." class="create-input">
        </div>
        <div style="margin-bottom: 15px;">
          <label class="poppins-bold">Category</label>
          <select id="post-category-input" class="create-input">
            <option value="discussion">Discussion</option>
            <option value="news">News</option>
            <option value="help">Help</option>
          </select>
        </div>
        <div style="margin-bottom: 15px;">
          <label class="poppins-bold">Content</label>
          <textarea id="post-content-input" rows="5" placeholder="What's the story?" class="create-input"></textarea>
        </div>
        <button class="home-create-btn poppins-extrabold" onclick="handlePostSubmission()" style="width: 100%; padding: 12px; cursor: pointer;">Publish Post</button>
      </div>
    </div>
  </div>

  <div id="post-view-modal" class="modal">
    <div class="modal-backdrop" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">
      <div class="modal-container" style="background: #fdf8e2; border: 2px solid #000; width: 90%; max-width: 800px; padding: 20px; max-height: 90vh; overflow-y: auto;">
        <button class="modal-close-btn" onclick="closePostModal()" style="float: right; font-size: 24px; border: none; background: none; cursor: pointer;">×</button>
        <div id="modal-post-content"></div>
        <div class="comments-section" style="margin-top: 30px; border-top: 1px solid #000; padding-top: 20px;">
          <h3 class="comments-title poppins-extrabold">Comments (<span id="comment-count">0</span>)</h3>
          <div class="comments-list" id="comments-list"></div>
          <div class="comment-input-area" style="margin-top: 20px;">
            <textarea id="comment-input" placeholder="Add a comment..." rows="3" class="comment-textarea" style="width:100%;"></textarea>
            <button id="submit-comment-btn" class="submit-comment-btn poppins-extrabold">Post Comment</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="posts-component.js"></script>
  <script src="alert.js"></script>
  <script src="header.js"></script>
  <script src="global-sidebar.js"></script>
  <script src="navbar.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var paperGrid = document.getElementById("paperGrid");
      var popularPreview = document.getElementById("popularPreview");
      var discoverPreview = document.getElementById("discoverPreview");
      var viewMoreGate = document.getElementById("viewMoreGate");
      var loginStatus = document.getElementById("loginStatus");
      var profileLink = document.getElementById("profileLink");
      var mastheadDate = document.getElementById("mastheadDate");

      function isLoggedIn() {
        var id = (localStorage.getItem("currentUserId") || "").trim();
        return id.length > 0;
      }

      function escapeHtml(str) {
        return String(str == null ? "" : str).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      }

      function excerpt(text, n) {
        var t = String(text || "").trim().replace(/\s+/g, " ");
        if (t.length <= n) return t;
        return t.slice(0, n).trim() + "…";
      }

      function parseDateSafe(dateStr) {
        var d = new Date(dateStr);
        return !isNaN(d.getTime()) ? d : new Date(0);
      }

      function prettyCategory(cat) {
        var c = String(cat || "").toLowerCase();
        if (c === "news") return "News";
        if (c === "help") return "Help";
        return "Discussion";
      }

      // --- CREATE POST FUNCTIONS ---
      window.openCreatePostModal = function() {
        if (!isLoggedIn()) {
          AlertModal.show("Please login to create a post.", "error");
          return;
        }
        document.getElementById("create-post-modal").style.display = "flex";
      };

      window.closeCreatePostModal = function() {
        document.getElementById("create-post-modal").style.display = "none";
      };

      window.handlePostSubmission = function() {
        var title = document.getElementById("post-title-input").value.trim();
        var content = document.getElementById("post-content-input").value.trim();
        var category = document.getElementById("post-category-input").value;
        var authorId = localStorage.getItem("currentUserId");

        if (!title || !content) {
          AlertModal.show("Please fill in all fields.", "error");
          return;
        }

        PostsComponent_Instance.createPost(title, content, authorId, category);
        
        document.getElementById("post-title-input").value = "";
        document.getElementById("post-content-input").value = "";
        closeCreatePostModal();
        render(); 
        AlertModal.show("Story published!", "success");
      };

      function render() {
        var posts = PostsComponent_Instance.getDatabase().posts || [];
        
        if (mastheadDate) {
          mastheadDate.textContent = new Date().toLocaleDateString("en-US", {
            weekday: "long", year: "numeric", month: "long", day: "numeric"
          });
        }

        var logged = isLoggedIn();
        if (loginStatus) loginStatus.textContent = logged ? "Logged in" : "Guest mode";
        if (profileLink && !logged) {
          profileLink.textContent = "Login";
          profileLink.href = "login.html";
        }

        var latest = posts.slice().sort((a, b) => parseDateSafe(b.date) - parseDateSafe(a.date)).slice(0, 20);
        var FREE_COUNT = 14;

        if (paperGrid) {
          paperGrid.innerHTML = "";
          latest.forEach((post, i) => {
            var locked = (!logged && i >= FREE_COUNT);
            paperGrid.appendChild(PostsComponent_Instance.buildNewspaperArticle(post, i, locked));
          });
        }

        if (viewMoreGate) viewMoreGate.style.display = !logged ? "block" : "none";

        if (popularPreview) {
          popularPreview.innerHTML = "";
          var popular = posts.slice().sort((a, b) => {
            var scoreB = (Number(b.upvotes) || 0) - (Number(b.downvotes) || 0);
            var scoreA = (Number(a.upvotes) || 0) - (Number(a.downvotes) || 0);
            return scoreB - scoreA;
          }).slice(0, 4);
          popular.forEach(p => {
            var el = buildSideRow(p, !logged);
            popularPreview.appendChild(el);
          });
        }

        if (discoverPreview) {
          discoverPreview.innerHTML = "";
          latest.slice(0, 4).forEach((p, i) => {
            var el = buildSideRow(p, !logged && i >= 1);
            discoverPreview.appendChild(el);
          });
        }
      }

      function buildSideRow(post, locked) {
        var user = PostsComponent_Instance.getUserById(post.authorId) || { username: "User", photo: "assets/placeholder.png" };
        var el = document.createElement("div");
        el.className = "post-card-mini" + (locked ? " locked" : "");
        el.setAttribute("data-id", post.id);
        el.innerHTML = `
          <div class="post-author-header poppins-regular">
            <img src="${user.photo}" class="post-author-avatar">
            <div class="post-author-info">
              <span class="post-author-username poppins-extrabold">${escapeHtml(user.username)}</span>
            </div>
          </div>
          <h4 class="headline poppins-extrabold">${escapeHtml(post.title)}</h4>
          <p class="excerpt poppins-regular">${escapeHtml(excerpt(post.content, 60))}</p>
        `;
        return el;
      }

      // --- CLICK HANDLERS ---
      paperGrid.onclick = function (e) {
        var t = e.target;
        var action = t.getAttribute("data-action");
        var id = t.getAttribute("data-id");
        if (!action || !id) return;

        var isLocked = t.closest(".article")?.getAttribute("data-locked") === "1";
        if (!isLoggedIn() || isLocked) {
          AlertModal.show("Please login to view.", "error");
          return;
        }

        if (action === "open" || action === "comment") {
          PostsComponent_Instance.incrementViewCount(id);
          window.openPostModal(id);
          render();
        } else if (action === "up" || action === "down") {
          PostsComponent_Instance.voteOnPost(id, action);
          render();
        }
      };

      [popularPreview, discoverPreview].forEach(el => {
        el.onclick = function(e) {
          var card = e.target.closest(".post-card-mini");
          if (!card) return;
          if (card.classList.contains("locked") || !isLoggedIn()) {
            AlertModal.show("Please login to view.", "error");
            return;
          }
          window.openPostModal(card.getAttribute("data-id"));
        };
      });

      render();
      window.triggerPostsUpdate = render;
    });

    // --- VIEW MODAL HELPER ---
    window.openPostModal = function(id) {
      var post = PostsComponent_Instance.getPostById(id);
      if(!post) return;
      document.getElementById("modal-post-content").innerHTML = `
        <div class="section-row poppins-extrabold" style="color:#a3b565;">${post.category.toUpperCase()}</div>
        <h1 class="headline poppins-extrabold" style="font-size:32px; margin:10px 0;">${escapeHtml(post.title)}</h1>
        <p class="poppins-regular" style="font-size:16px; line-height:1.6; color:#333;">${escapeHtml(post.content)}</p>
      `;
      document.getElementById("post-view-modal").style.display = "flex";
    };

    window.closePostModal = function() {
      document.getElementById("post-view-modal").style.display = "none";
    };
  </script>
</body>
</html>
